<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Driver Panel</title>
  <link rel="stylesheet" href="css/driver.css">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">
</head>

<body>

  <div class="container">

    <div class="sidebar">
      <h2 class="logo">GoRide</h2>
      <a href="driver.html">Driver Panel</a>
      <a href="#" id="logoutBtn" class="logout-btn">Logout</a>
    </div>

    <div class="main">

      <h1>Driver Panel</h1>

      <div class="toggle-wrapper">
        <label class="switch">
          <input type="checkbox" id="onlineToggle">
          <span class="slider"></span>
        </label>
        <span id="toggleLabel" style="font-weight: 600;">You are Offline</span>
      </div>

      <div class="stats-wrapper" style="display: flex; gap: 15px; margin-bottom: 20px;">
        <div class="earnings card" style="flex: 1; margin: 0;">
          <h3>Today's Earnings</h3>
          <p id="earningsTotal">₹0</p>
        </div>
        <div class="card" style="flex: 1; margin: 0; background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1); text-align: center;">
          <h3>Total Rides</h3>
          <p id="totalRidesCount" style="font-size: 24px; font-weight: 600; color: #333; margin-top: 10px;">0</p>
        </div>
        <div class="card" style="flex: 1; margin: 0; background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1); text-align: center;">
          <h3>Avg Rating</h3>
          <p id="avgRatingStat" style="font-size: 24px; font-weight: 600; color: #333; margin-top: 10px;">0.0 ⭐</p>
        </div>
      </div>

      <h2 class="section-title">Active Ride Requests</h2>

      <div id="ridesContainer" class="ride-list">
        <!-- populated dynamically via JS -->
      </div>

    </div>

  </div>

  <script src="js/driver.js"></script>

  <!-- Quick inline style for toggle switch -->
  <style>
    .switch {
      position: relative;
      display: inline-block;
      width: 50px;
      height: 24px;
    }

    .switch input { 
      opacity: 0;
      width: 0;
      height: 0;
    }

    .slider {
      position: absolute;
      cursor: pointer;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background-color: #ccc;
      transition: .4s;
      border-radius: 24px;
    }

    .slider:before {
      position: absolute;
      content: "";
      height: 16px;
      width: 16px;
      left: 4px;
      bottom: 4px;
      background-color: white;
      transition: .4s;
      border-radius: 50%;
    }

    input:checked + .slider {
      background-color: #4CAF50;
    }

    input:checked + .slider:before {
      transform: translateX(26px);
    }
  </style>

</body>
</html>
