<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GoRide Dashboard</title>
  <link rel="stylesheet" href="css/dashboard.css">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">
</head>

<body>

  <div class="container">

    <div class="sidebar">
      <h2 class="logo">GoRide</h2>
      <a href="dashboard.html">Dashboard</a>
      <a href="book.html">Book Ride</a>
      <a href="history.html">Ride History</a>
      <a href="profile.html">Profile</a>
      <a href="#" id="logoutBtn" class="logout-btn">Logout</a>
    </div>

    <div class="main">

      <h1 id="welcomeGreeting">Welcome Back 👋</h1>

      <div class="stats">
        <div class="card">
          <h3>Total Rides</h3>
          <p id="totalRidesStat">0</p>
        </div>
        <div class="card">
          <h3>Completed</h3>
          <p id="completedRidesStat">0</p>
        </div>
        <div class="card">
          <h3>Upcoming</h3>
          <p id="upcomingRidesStat">0</p>
        </div>
      </div>

      <div class="actions">
        <a href="book.html" class="btn">Book a Ride</a>
        <a href="history.html" class="btn secondary">View History</a>
      </div>

      <h2 class="section-title">Recent Rides</h2>

      <div class="ride-list" id="recentRidesList">
        <!-- populated dynamically -->
      </div>

    </div>

  </div>

  <script src="js/dashboard.js"></script>

</body>
</html>
