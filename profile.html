<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Profile</title>
  <link rel="stylesheet" href="css/profile.css">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">
</head>

<body>

  <div class="container">

    <div class="sidebar">
      <h2 class="logo">GoRide</h2>
      <a href="dashboard.html">Dashboard</a>
      <a href="book.html">Book Ride</a>
      <a href="history.html">Ride History</a>
      <a href="profile.html">Profile</a>
      <a href="#" id="logoutBtn" class="logout-btn">Logout</a>
    </div>

    <div class="main">

      <h1>Profile</h1>

      <div class="profile-layout">

        <!-- Profile Card -->
        <div class="profile-card">
          <h3 style="margin-bottom: 20px; font-size: 22px;">Personal Details</h3>
          
          <p><b>Name:</b> <span id="userName"></span></p>
          <input type="text" id="editName" placeholder="Update your name">

          <p><b>Phone:</b> <span id="userPhone"></span></p>
          <input type="tel" id="editPhone" placeholder="Update your phone (10 digits)" maxlength="10">

          <p><b>Email:</b> <span id="userEmail"></span></p>
          <p><b>Role:</b> <span id="userRole"></span></p>

          <button id="editProfileBtn" class="btn">Edit Profile</button>
        </div>

        <div class="profile-right">

          <!-- Wallet Section -->
          <div class="section-title">My Wallet</div>

          <div class="wallet-card">
            <div class="wallet-balance">
              <div>
                <p class="wallet-label">Available Balance</p>
                <p class="wallet-amount" id="walletAmount">&#8377; 0</p>
              </div>
              <button id="addMoneyBtn" class="btn">Add Money</button>
            </div>

            <div class="wallet-transactions">
              <p class="wallet-sub">Recent Transactions</p>
              <div id="transactionsList">
                <!-- Transactions populates here -->
              </div>
            </div>
          </div>

        </div>

      </div>

    </div>

  </div>

  <script src="js/profile.js"></script>

</body>
</html>
